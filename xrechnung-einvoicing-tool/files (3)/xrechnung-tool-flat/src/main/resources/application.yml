spring:
  application:
    name: xrechnung-einvoicing-tool

  datasource:
    # Default: in-memory H2 for local development / demo purposes.
    # Swap to PostgreSQL for anything resembling production use —
    # see the postgres profile below.
    url: jdbc:h2:mem:einvoicing;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

einvoicing:
  mail:
    from: ${EINVOICING_FROM_ADDRESS:invoicing@example.com}

server:
  port: ${PORT:8080}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:einvoicing}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:einvoicing}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
